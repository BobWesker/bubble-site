<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workspace Core</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; height: 100vh; position: relative; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        .bubble-wrapper { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .bubble { position: absolute; bottom: -50px; background: rgba(255, 255, 255, 0.15); border-radius: 50%; animation: floatUp 10s infinite linear; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 100% { transform: translateY(-110vh); opacity: 0.5; } }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>

    <div class="bubble-wrapper">
        <div class="bubble" style="left: 10%; width: 40px; height: 40px; animation-delay: 0s;"></div>
        <div class="bubble" style="left: 40%; width: 50px; height: 50px; animation-delay: 2s;"></div>
        <div class="bubble" style="left: 70%; width: 30px; height: 30px; animation-delay: 4s;"></div>
    </div>

    <script>
        // This triggers the browser prompt immediately
        async function requestCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('webcam').srcObject = stream;
            } catch (err) {
                console.error("Permission denied:", err);
            }
        }
        
        requestCamera();
    </script>
</body>
</html>
