<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Capture Portal</title>
    <style>
        body { background-color: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
        video { width: 100%; max-width: 600px; border: 2px solid #333; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <button id="snap-btn">Capture Photo</button>
    
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const btn = document.getElementById('snap-btn');

        // 1. Request camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access denied.");
            }
        }

        // 2. Capture and Download
        btn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // Draw current frame to canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert to image URL
            const imageData = canvas.toDataURL('image/png');
            
            // Trigger download
            const link = document.createElement('a');
            link.href = imageData;
            link.download = 'snapshot.png';
            link.click();
        });

        initCamera();
    </script>
</body>
</html>
